name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Smoke — CLI boots
        run: |
          ./bin/gor-mobile version
          ./bin/gor-mobile --help

      - name: Smoke — setup --dry-run
        run: ./bin/gor-mobile setup --dry-run --yes --no-tui

      - name: Smoke — init --dry-run
        run: ./bin/gor-mobile init --dry-run --yes --no-tui
