name: release
on:
  push:
    tags:
      - "v*"

jobs:
  publish-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build formula
        run: |
          ./scripts/build-formula.sh "${{ steps.version.outputs.version }}" \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" \
            > /tmp/gor-mobile.rb
          cat /tmp/gor-mobile.rb

      - name: Commit formula to tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/gorban-dev/homebrew-gor-mobile.git" tap
          mkdir -p tap/Formula
          cp /tmp/gor-mobile.rb tap/Formula/gor-mobile.rb
          cd tap
          git add Formula/gor-mobile.rb
          if git diff --cached --quiet; then
              echo "Formula already up-to-date for v${{ steps.version.outputs.version }} — nothing to commit"
              exit 0
          fi
          git -c user.email=ci@gor-mobile -c user.name="gor-mobile CI" \
              commit -m "gor-mobile ${{ steps.version.outputs.version }}"
          git push
